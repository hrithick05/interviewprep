<!DOCTYPE html>
<html>
<head>
    <title>Resume</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background: #f4f6f9;
        }

        .resume {
            background: #fff;
            padding: 30px;
            max-width: 800px;
            margin: auto;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .header {
            text-align: center;
            border-bottom: 2px solid #2c3e50;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .header h1 {
            margin: 0;
            color: #2c3e50;
        }

        .header p {
            margin: 5px 0;
            color: #555;
        }

        h2 {
            color: #2c3e50;
            border-bottom: 1px solid #ccc;
            padding-bottom: 5px;
        }

        .section {
            margin-bottom: 20px;
        }

        .download-btn {
            text-align: center;
            margin-top: 20px;
        }

        button {
            background: #2c3e50;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #1a252f;
        }
    </style>
</head>
<body>

<div class="resume">

    <!-- HEADER -->
    <div class="header">
        <h1>{{ name }}</h1>
        <p>{{ email }} | {{ phone }}</p>
    </div>

    <!-- SKILLS -->
    <div class="section">
        <h2>Skills</h2>
        <p>{{ skills }}</p>
    </div>

    <!-- EDUCATION -->
    <div class="section">
        <h2>Education</h2>
        <p>{{ education }}</p>
    </div>

    <!-- PROJECTS -->
    <div class="section">
        <h2>Projects</h2>
        <p>{{ projects }}</p>
    </div>

</div>

<!-- DOWNLOAD BUTTON -->
<div class="download-btn">
    <form method="POST" action="{% url 'download_resume' %}">
        {% csrf_token %}

        <input type="hidden" name="name" value="{{ name }}">
        <input type="hidden" name="email" value="{{ email }}">
        <input type="hidden" name="phone" value="{{ phone }}">
        <input type="hidden" name="skills" value="{{ skills }}">
        <input type="hidden" name="education" value="{{ education }}">
        <input type="hidden" name="projects" value="{{ projects }}">

        <button type="submit">⬇ Download PDF</button>
    </form>
</div>

</body>
</html>
